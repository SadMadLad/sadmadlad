- title: C++
  notes:
    - title: Preprocessors
      paragraphs:
        - text: "Preprocessors in a C++ file are basically commands or files executed before the file does. They start with a #."
          has_code_snippet: false
    - title: Header Guards
      paragraphs:
        - text: Header Guards ensure us to include our file only once in our file and avoid redeclaration.
          has_code_snippet: false
        - text: |
            There are two ways to define header guards. One is by using <code class="bg-zinc-800"><b>#pragma once</b></code> and the other is <code class="bg-zinc-800"><b>#ifndef, #define, #endif</b></code>. Both of these do the same thing and make sure to include the file only once.
            The <code class="bg-zinc-800">#ifndef</code> method allows us to create a tag for file and make sure it is defined once. <code class="bg-zinc-800">#pragma once</code> is a shorthand for this.
          has_code_snippet: false
    - title: Static in C++
      paragraphs:
        - text: |
            The <code class="bg-zinc-800">static</code> keyword works different in different contexts.
            <ul class="list-inside list-disc">
              <li>In separate files, if a function or a variable is declared <code class="bg-zinc-800">static</code>, it remains private for that file.</li>
              <li>Class methods or instance variables if declared <code class="bg-zinc-800">static</code>, are shared among all the instance among that specific class. If we draw similarity with Ruby classes, the <code class="bg-zinc-800">static</code> method will be a class method (using <code class="bg-zinc-800">self.method_name</code>) and static variable will be declared using <code class="bg-zinc-800">@@</code>.</li>
              <li><code class="bg-zinc-800">static</code> method cannot access non-static class methods or variables.</li>
              <li><code class="bg-zinc-800">static</code> methods and variables of a class are accessed using <code class="bg-zinc-800>ClassName::MethodOrVariableName</code></li>
            </ul>
        - has_code_snippet: false
    - title: Enums
      paragraphs:
        - text: Enums are declared using the <code class="bg-zinc-800">enum</code> keyword. They can also be declared as Enum classes for more verbosity. On their own, enums behave exactly like array of integers. When declared with class, they are more verbose
            and need to be namespaced if they need to be accessed.
          has_code_snippet: true
          code_snippet:
            language: cpp
            code: |
              enum Size {
                Small, Medium, Large
              };

              enum class SizeClass {
                Small, Medium, Large
              };

              int main() {
                if (SizeClass::Large > SizeClass::Medium) {
                  std::cout << "Nice" << std::endl;
                }

                if (Large > Medium) {
                  std::cout << "Nice" << std::endl;
                }
              }
- title: Ruby on Rails
  notes:
  - title: How do Turbo Frames work seemingly
    updated_on: 17 July, 2023
    paragraphs:
    - text: On a surface level, turbo frames allow to target certain frames from other
        or within the same pages. They do this by intercepting the link and targetting
        the <code class="bg-zinc-800">turbo-frame</code> by its id.
      has_code_snippet: false
    - text: As an example, let's have a search form for users. The forms fetches the
        users, targets the turbo frame with id of users and shows the users in that
        frame.
      has_code_snippet: true
      code_snippet:
        language: erb
        code: |
          <%= form_with url: users_path, class: 'flex-1', method: :get, data: { turbo_frame: 'users' } do |f| %>
              <%= f.text_field :query %>
          <% end %>
    - text: 'The form on the page looks like this:'
      has_code_snippet: true
      code_snippet:
        language: erb
        code: |
          <%= turbo_frame_tag 'users' do %>
            <%= render(partial: 'user', collection: @users) %>
          <% end %>
    - text: 'And the controller this form hits looks like this:'
      has_code_snippet: true
      code_snippet:
        language: ruby
        code: "class UsersController < ApplicationController  \n  def index\n    @users
          = current_company.users.active.search(params)\n  end\nend\n"
    - text: Now, when the search happens, the form targets the frame with the id of
        "users" and updates the frame accordingly. Quite cool. In a similar manner,
        we can have a frame on an entirely different page and the form can target
        that specific frame and fetch the results on the page on which you are staying.
      has_code_snippet: false
    - text: Furthermore, the links within a frame work differently. If a link is clicked
        with in a frame (let's say, the link takes you to a new page), turbo will
        intercept the link and try to fetch the frame of the same id from the newer
        page. The behavior of links can be controlled using different attributes like
        <code class="bg-zinc-800">data-turbo-frame</code> etc.
- title: Ruby
  notes:
  - title: '&. operator'
    paragraphs:
    - text: This operator is called safe navigation operator. It allows to us to have <code class="bg-zinc-800">nil</code> check on the variables before we
        execute any method (or check for an attribute) for the variable.
      has_code_snippet: true
      code_snippet:
        language: ruby
        code: |
          # Both the expressions below behave the same.
          @person&.spouse&.name
          @person.spouse.name if @person && @person.spouse
- title: Rust
  notes:
  - title: What is a Macro in Rust?
    paragraphs:
    - text: 'Macros are pieces of code that generate more code. There are usually
        highlighted with exclamation mark at the end (like <code class="bg-zinc-800">println!</code>).
        Macros are quite useful when it comes to metaprogramming.'
      has_code_snippet: false
  - title: What is a cargo?
    paragraphs:
    - text: Cargo is a build system and package manager for Rust. It has a TOML file
        (Tom's Obvious, Minimal Language) to keep track of configuration, version
        and dependencies. It also helps in debugging, optimizing, and releasing code
        packages. Checkout the Command Lines page to see some cargo commands.
      has_code_snippet: false
  - title: Variables, Constants, Mutability and Shadowing
    paragraphs:
    - text: 'Variables in Rust are declared using <code class="bg-zinc-800">let</code>
        keyword. By default, all the variables are immutable in Rust, which means
        their value cannot be changed.'
      has_code_snippet: false
    - text: 'To create a mutable value in Rust, we would need to use the <code class="bg-zinc-800">mut<code>keyword.'
      has_code_snippet: false
    - text: 'Constants in Rust are declared using the <code class="bg-zinc-800">const</code>
        keyword. Declaration of Constant always requires a type. By convention, the variable name is always capitalized.'
      has_code_snippet: false
    - text: 'Shadowing allows you to override the previous value of the same variable.
        Basically, it just creates a new variable. An example:'
      has_code_snippet: true
      code_snippet:
        language: rust
        code: |
          fn main() {
              let x = 10;
              let x = x + 1; // Shadowing
              println!("x's value: {x}");
          }
  - title: Shadowing vs Mutable Variable
    paragraphs:
    - text: 'Shadowing allows to override the type of the previous variable while
        <code class="bg-zinc-800">mut</code> does not allow you to change the type
        of the variable. As an example:'
      has_code_snippet: true
      code_snippet:
        language: rust
        code: |
          fn main() {
              let x = "123";
              let x = x.len(); // Valid because of shadowing.

              let mut y = "123";
              y = y.len(); // Not Valid
          }
  - title: Data Types
    paragraphs:
    - text: 'Rust is statically typed, which means it needs to know the types of the variable before compilation.
        For example, this will render an error because we have not defined the type of the <code class="bg-zinc-800>guess</code>.'
      has_code_snippet: true
      code_snippet:
        language: rust
        code: |
          let guess = "42".parse().expect("Not a number!");
    - text: 'There are two types of data in Rust: Scalar and Compound. Scalar types represent a single value, like boolean, integer, character and floating
        point number. Compound Types have multiple values in them, like tuples and arrays.'
      has_code_snippet: false
    - text: Integers can be created using different data types like <code class="bg-zinc-800">i8, u8,
        i16, i32, i64</code> and their unsigned versions. There are many ways to represent the integer too
        like <code class="bg-zinc-800">92_000, 0xff, 0o33, 0b1111_0000, b'A'</code> which represent decimal,
        hexadecimal, octadecimal, binary and bytes.
      has_code_snippet: false
    - text: 'Arrays can be declared in different ways, like this:'
      has_code_snippet: true
      code_snippet:
        language: rust
        code: |
          let list_one: [i32; 3] = [3, 3, 3];
          let list_two = [3; 5]; // list_two = [3, 3, 3, 3, 3]
  - title: Statements vs Expressions
    paragraphs:
    - text: 'Statements are lines of codes that perform some action but do not give a resultant value.
        Statements usually end with a semicolon. Expressions always result a value, and do not end with a semicolon.
        If a function returns something, it should always end in an expression. Some examples:'
      has_code_snippet: true
      code_snippet:
        language: rust
        code: |
          fn main() {
              let y = (let x = 10); // Will cause an error because let is always a statement, and 'y' is not being bound to anything.
              let z = {
                  let x = 10;
                  10 + 1
              }; // Valid and 'z' will be 11 because the code block has returned it in the expression. If we put semicolon after 10 + 1, it will not work as it will become a statement then.
          }

          fn five() -> i32 {
              5 // Function returns an expression
          }
  - title: Heap vs Stack
    paragraphs:
      - text: 'Rust requires you to understand the difference between Heap and Stack to understand
          how does ownership works. In stack, the data stored at the top, and fetch first (Last In First Out)
          Accessing and pushing data to a stack is easier. Rust uses stack to store variables whenever the size
          is known.'
        has_code_snippet: false
      - text: 'On the other hand, storing data in a heap is a lot more random. Heap needs a pointer to achieve this,
          to know how much space is required. Heap is used to variables that do not have fixed known size. Accessing and pushing to heap is slower.
          Rust uses heap to store strings.
          Whenever a value that is stored in a heap goes out of scope, the memory becomes free.'
        has_code_snippet: false
- title: Git
  notes:
  - title: Different version controls (CVS, SVN, Git)
    paragraphs:
    - text: 'CVS and SVN are fairly similar to each other in a sense that; both are centralized version control systems,
        both have linear workflow (i.e. commits are to the main trunk only), both need their developers to have connection
        in order to commit, both are somewhat similar in speed.'
      has_code_snippet: false
    - text: 'On the other hand, Git has a decentralized approach where each develop can have a copy of the codebase, do his/her
        tasks offline and commit. Git uses branching and a powerful merging algorithm to merge branches, commits and resolve
        conflicts, and is faster than CVS and SVN.'
      has_code_snippet: false
- title: Miscellaneous
  notes:
    - title: Makefile?
      paragraphs:
      - text: 'Makefiles allow us to build files where re-build is needed. Makefiles are intelligent enough to detect if build is needed
          or not. They consist of variables, dependencies and commands in their files. Headers are not included generally in the makefile.
          A typical makefile looks like this:'
        has_code_snippet: true
        code_snippet:
          language: makefile
          code: |
            CC=g++ # Variable for type of compile
            CFLAGS=-g -Wall # Variable for flags to use

            CFILES=main.cpp	# Files to build
            OBJECTS=main.o	# Object files to be created from files

            BINARY=bin	# Variable for command

            # A convention for makefiles to include an all: directive, which typically compiles all the files.
            # Here, it runs the 'bin' command. But then it looks for, how can I build 'bin', for which it moves to next command.
            all: $(BINARY)

            # The next directive creates the object files (as mentioned in OBJECTS variable). So far, to compile the bin directive, it has to create object files.
            # The command for creating those files is $(CC) -o $@ $^. Here, CC is the compile, -o is the flag for creating object files. $@ means what is on the left side of the directive (bin). $^ means what is on the right side of the directive (here it is main.o)
            # But now it needs to look for how to create those object files from the cpp files, and the command below tells it that.
            $(BINARY): $(OBJECTS)
              $(CC) -o $@ $^

            # Very similar to the directive above. One new thing here is the wildcard %.
            # The directive can be read as: For creating a x.o file from each x.cpp file, run the command below.
            %.o: %.cpp
              $(CC) $(FLAGS) -c -o $@ $^

            # A clean directive to remove binary and object files.
            clean:
              rm -rf $(BINARY) $(OBJECTS)
    - title: UTF-8?
      paragraphs:
      - text: First came ASCII. It was simple enough to store english alphabets. Then the number of bytes was increased for internationalization which created
          a whole lot of mess when exchanging information via emails and stuff. But the management of bytes was atrocious and was never viable for many characters.
          Then came Unicode, which consisted of <i>code point</i> (U+0639) where U+ was Unicode while +0639 was the hexadecimal number. This added support for more
          characters. But this system had a lot of unused bytes (with lots of 00s like U+0066, U+0041 etc.), which was incovenient for English alphabets. Then came UTF-8
          for using less bytes for English characters. When the character code goes beyond 127, all bets are off and we would need to know which encoding was it, either it was
          ASCII, UTF-8, UTF-16, Latin etc. (The information is not completely true and ambiguous and I would need to read it a little more.) That's why we have charset=UTF-8 in our HTML to
          ensure that the encoding is in UTF-8.
        has_code_snippet: false
- title: Elixir
  notes:
    - title: Basics
      paragraphs:
      - text: |
          <ul class="list-inside list-disc">
            <li>Elixir is a functional programming language</li>
            <li>The notation for represent a functions is like this <code class="bg-zinc-800">foo/4</code>. The notation means there is a <code class="bg-zinc-800">foo</code> function with 4 arguments.</li>
            <li>Numbers can be written in binary, octal or hex form, like <code class="bg-zinc-800">0x0110, 0o231, 0x1F</code></li>
            <li>Atoms are similar to Ruby symbols. In elixir, the module names (either from erlang or custom) are atoms, so are booleans.</li>
            <li>Integer divison can be done by <code class="bg-zinc-800">div/2</code>, and modulos can be calculated using <code class="bg-zinc-800">rem/2</code> method.</li>
            <li><code class="bg-zinc-800">==</code> compares values, <code class="bg-zinc-800">===</code> compares value and the type.</li>
            <li><code class="bg-zinc-800"><></code> is a concatenation operator.
          </ul>
        has_code_snippet: false
    - title: Collections
      paragraphs:
      - text: |
          <ul class="list-inside list-disc">
            <li>Lists in Elixir are linked lists.</li>
            <li><code class="bg-zinc-800">++/2</code> is an operator for list concatenation.</li>
            <li><code class="bg-zinc-800">hd/1</code> method extracts the head of the list.</li>
            <li><code class="bg-zinc-800">tl/1</code> method extracts the tail of the list.</li>
            <li>Tuples are declared like this: <code class="bg-zinc-800">{item1, item2}</code>. Tuples are quite useful when it comes to pattern matching.</li>
            <li>Maps are declared like this: <code class="bg-zinc-800">%{key: value}</code> or <code class="bg-zinc-800">%{key => value}</code></li>
            <li><code class="bg-zinc-800">Map.put/3</code> is used to add a new key-value pair to a map.</li>
          </ul>
        has_code_snippet: false
    - title: Enum
      paragraphs:
      - text: 'Some of the methods provided by <code class="bg-zinc-800">Enum</code> module are as following:'
        has_code_snippet: true
        code_snippet:
          language: elixir
          code: |
            _map = Enum.map([1, 2, 3], fn(n) -> n + 3 end)
            _filter = Enum.filter([1, 2, 3], fn(n) -> n - 1 == 0 end)
            _map_two = Enum.map([1, 2, 3], &(&1 + 10))
            _reduce = Enum.reduce([1, 2, 3], 6, &(&1 + &2))
    - title: Pattern Matching
      paragraphs:
      - text: The <code class="bg-zinc-800">=</code> is more of a match operator than an assignment operator. The following
          code snippet show cases what pattern matching looks like. The pin operator makes the reassignment impossible for a variable.
        has_code_snippet: true
        code_snippet:
          language: elixir
          code: |
            {:ok, value} = {:ok, "Successful"} # value = "Successful"
            x = 1
            1 = x
            2 = x # Invalid
            ^x = 2 # Invalid because of pin operator
    - title: Control Structures
      paragraphs:
      - text: There are many ways for writing control structures in Elixir.
        has_code_snippet: false
      - text: <code class="bg-zinc-800">if do; else</code> are the if-else statements for elixir. There is <code class="bg-zinc-800">unless</code>
          too like in Ruby.
        has_code_snippet: true
        code_snippet:
          language: elixir
          code: |
            if 1 < 2 do
              x = 30
            else
              x = 40
            end

            x = if 1 < 2, do: 2, else: 2 # Ternary-like one liner for Elixir
      - text: <code class="bg-zinc-800">case</code> allows us to match against multiple patterns. A <code class="bg-zinc-800">case</code> always
          requires a default (_) case.
        has_code_snippet: true
        code_snippet:
          language: elixir
          code: |
            result = 30

            x = case {1, 2} do
              {1, ^result} -> result
              _ -> 3
            end

            IO.puts x # 3
      - text: <code class="bg-zinc-800">cond</code> is a more verbose way to return value based on the given conditions. It is different from
          <code class="bg-zinc-800">case</code> because <code class="bg-zinc-800">case</code> uses pattern matching while
          <code class="bg-zinc-800">cond</code> checks multiple conditions (like if, else if, ... else).
        has_code_snippet: true
        code_snippet:
          language: elixir
          code: |
            x = cond do
              1 < 2 -> 3
              true -> 4
            end
    - title: Functions
      paragraphs:
      - text: 'Elixir has anonymous functions. They can be declared with something like this:'
        has_code_snippet: true
        code_snippet:
          language: elixir
          code: |
            sum = &(&1 + &2)
            sum.(1, 2) # 3

            diff = fn(a, b) -> a - b end
            diff.(1, 2) # -1
      - text: |
          <ul class="list-disc list-inside">
            <li>Named functions are declared using the <code class="bg-zinc-800">def</code> keyword with a <code class="bg-zinc-800">do</code> block.</li>
            <li>To create a private function for a module, <code class="bg-zinc-800">defp</code> keyword is for the module.</li>
            <li>
              Pattern matching happens for the arity (arguments) of the functions too. Functions can be polymorphic too based on the number of arguments,
              and using the guards (with the <code class="bg-zinc-800">when</code> keyword.)
            </li>
            <li>Default arguments can be passed using <code class="bg-zinc-800">//</code></li>
          </ul>
        has_code_snippet: true
        code_snippet:
          language: elixir
          code: |
            defmodule Foos do

              # Named argument
              def hello() do
                IO.puts "Hello"
              end

              # Pattern Matching on arguments
              def pattern_boi(%{name: person_name}) do
                person_name
              end

              # One-Liner
              def hello_two(), do: 0

              # Polymorphic
              def poly() do
                1
              end

              def poly(one) do
                2
              end

              # With Guards
              def poly_guard(n) when is_integer(n) do
                n
              end

              def poly_guard(n) when is_float(n) do
                n + 1.0
              end

              # Default Arguments
              def poly_default(n \\ 10) do
                n + 32
              end

              # Private Function
              defp hello_private() do
                IO.puts "Private Hello"
              end
            end
    - title: Pipe Operator
      paragraphs:
        - text: The pipe operator <code class="bg-zinc-800">|></code> allows to link multiple functions step-by-step cleanly.
          has_code_snippet: true
          code_snippet:
            language: elixir
            code: |
              x = [1, 2, 3, 4, 5, 6]
                    |> Enum.filter(&(rem(&1, 2) == 0))
                    |> Enum.map(fn(n) -> n*2 end)
    - title: Modules
      paragraphs:
        - text: |
            <ul class="list-disc list-inside">
              Elixir has modules that allow you to group functions within a module cleanly. Modules are declared using the <code class="bg-zinc-800">defmodule</code> keyword.
              <li><code class="bg-zinc-800">defstruct</code> allows us to create structures in a module. These structures are special maps and are mainly used within modules (same or the other).</li>
              <li><code class="bg-zinc-800">@derive</code> feature allows to hide certain keys of a structure to keep it private.</li>
              <li>Module attributes are declared using <code class="bg-zinc-800">@attribute</code>. These are basically constants.</li>
            </ul>
          has_code_snippet: true
          code_snippet:
            language: elixir
            code: |
              defmodule Person.Head do
                # Now, we can use Person.Employee as Employee only.
                @greeting "Hello Boy"

                # Structure for modules
                @derive {Inspect, only: [:name]}
                defstruct name: "Edgar Kalou", age: 32

                def say, do: Person.Employee.say_hello
                def say_greeting, do: "#{@greeting} World!"

                def lumps_boy, do: %Person.Head{name: "Phelps"}
              end
        - text: |
            <ul class="list-disc list-inside">
              <li>The <code class="bg-zinc-800">alias</code> keyword allows us to namespace modules</li>
              <li><code class="bg-zinc-800">require</code> allows to use macros from a module.</li>
              <li>With the use of <code class="bg-zinc-800">use</code>, <code class="bg-zinc-800">quote</code> and <code class="bg-zinc-800">unquote</code>, we can extend and generate cool modules via meta-programming.</li>
            </ul>
          has_code_snippet: true
          code_snippet:
            language: elixir
            code: |
              import List, only: [last: 1]
              require List

              defmodule BigBrain do
                defmacro __using__(opts) do
                  attributes = Keyword.get(opts, :attributes, [])

                  quote do
                    def enlist_attributes, do: Enum.each(unquote(attributes), &(IO.puts &1))
                  end
                end
              end

              defmodule MyAttribute do
                use BigBrain, attributes: [:name, :age]
              end
    - title: Sigils
      paragraphs:
        - text: |
            <ul class="list-disc list-inside">
              Sigils allow us to display or store data in a more verbose way. The capital ones do not allow string interpolation while smaller ones do.
              <li><code class="bg-zinc-800">~c</code> are used for character list.</li>
              <li><code class="bg-zinc-800">~r</code> is for regular expressions.</li>
              <li><code class="bg-zinc-800">~s</code> is for strings.</li>
              <li><code class="bg-zinc-800">~W</code> is for word lists.</li>
            </ul>
          has_code_snippet: false
    - title: Documentation
      paragraphs:
        - text: <code class="bg-zinc-800">#</code> is for inline comments. <code class="bg-zinc-800">@doc</code> is for functional level documentation. <code class="bg-zinc-800">@moduledoc</code> is for module level documentation.
          has_code_snippet: false
    - title: Comprehension
      paragraphs:
        - text: The <code class="bg-zinc-800">for</code> keyword with <code class="bg-zinc-800"><-</code> is used for list comprehension.
          has_code_snippet: true
          code_snippet:
            language: elixir
            code: |
              list = for x <- [1, 2, 3], do: x*x

              d = %{"a" => "b", "c" => "d"}
              d = for {k, v} <- d, do: {k, v}
    - title: Strings and Characters
      paragraphs:
        - text: |
            <ul class="list-inside list-disc">
              <li>Anything between <<>> shows that it is a sequence of bytes.</li>
              <li>String is declared with double quotes while char list uses single quotes.</li>
              <li>Strings are represented with a sequence of bytes while char list is array of characters.</li>
              <li>Each character in char is Unicode code point of a character while in binary, the codepoints are encoded as UTF-8.</li>
              <li>Primarily, strings should be used. Charlists are needed for support for erlang modules mainly.</li>
              <li><code class="bg-zinc-800">?</code> can give us the code point of a character</li>
            </ul>
          has_code_snippet: true
          code_snippet:
            language: elixir
            code: |
              string = "hełło" # <<104, 101, 197, 130, 197, 130, 111>>
              # Because string is UTF-8, the 255+ characters are translated with two separate bytes.
              # This has happened for ł

              charlist = 'hełło' #[104, 101, 322, 322, 111]
              # Meanwhile for charlist, this is not needed, as they are unicodes with two or more than two bytes designated.

              # 322 is ł. For string, it is encoded in two different UTF-8 bytes, but not in charlist.

              ?Z # 90
        - text: |
            <ul class="list-inside list-disc">
              <li>Codepoints are characters that take one or more bytes. <code class="bg-zinc-800">String.codepoints</code> will split a 'heavy' character (that uses multiple bytes) into its composite bytes.</li>
              <li>Graphemes combine the bytes into a single character. <code class="bg-zinc-800">String.graphemes</code> is for this job.</li>
              <li>The unicode characters can be written in a string using <code class="bg-zinc-800">\uXXXX</code> keyword.</li>
            </ul>
          has_code_snippet: true
          code_snippet:
            language: elixir
            code: |
              string = "\u0061\u0301"

              IO.inspect String.codepoints(string) # ["a", "́"]
              IO.inspect String.graphemes(string) # ["á"]
- title: PostgreSQL
  notes:
  - title: Interpret database links
    paragraphs:
    - text: |
        A database can look like this:
        DATABASE_URL=postgresql://<username>:<password>@<host>/<database-name>
      has_code_snippet: false
